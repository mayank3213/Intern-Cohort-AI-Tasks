# Example nginx config (legacy deployment reference)
# Requires php5-fpm and php5-curl extension

server {
    listen 80;
    server_name contact-api.local;
    root /var/www/contact-api/public;

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php5-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
