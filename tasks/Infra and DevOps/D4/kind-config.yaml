# kind cluster with host port 8080 mapped for optional ingress-nginx (see README).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: d4-echo
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
